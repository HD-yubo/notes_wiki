<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="675" viewBox="0 0 1200 675" role="img" aria-label="一次跨境支付的全过程——6步流程" font-family="Noto Sans SC, Source Han Sans SC, PingFang SC, system-ui, sans-serif">
  <defs>
    <filter id="soft-shadow" x="-8%" y="-12%" width="116%" height="128%">
      <feDropShadow dx="0" dy="5" stdDeviation="7" flood-color="#111827" flood-opacity="0.08"/>
    </filter>
    <pattern id="dot-grid" width="28" height="28" patternUnits="userSpaceOnUse">
      <circle cx="1.5" cy="1.5" r="1.2" fill="#E8E4DA" opacity="0.85"/>
    </pattern>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth">
      <path d="M2,2 L10,6 L2,10" fill="none" stroke="#1B365D" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" />
    </marker>
  </defs>
  <rect width="1200" height="675" fill="#F5F4ED"/>
  <rect x="1" y="1" width="1198" height="673" rx="18" fill="#FAF9F5" stroke="#D9D6CC" stroke-width="1.6"/>
  <rect x="1" y="1" width="1198" height="673" rx="18" fill="url(#dot-grid)" opacity="0.34"/>
  <rect x="72" y="206" width="1056" height="390" rx="16" fill="#F5F4ED" stroke="#D9D6CC" stroke-width="1.1" opacity="0.82"/>
  <text x="84" y="82" fill="#1B365D" font-size="12" font-weight="800" letter-spacing="1.2">第2章</text>
  <text x="1116" y="82" text-anchor="end" fill="#5F6673" font-size="11" font-weight="700" letter-spacing="1">教学图示</text>
  <rect x="84" y="100" width="54" height="4" rx="2" fill="#1B365D"/>
  <text x="84.0" y="136.0" text-anchor="start" fill="#111827" font-size="31" font-weight="800"><tspan x="84.0" dy="0">一次跨境支付的全过程——6步流程</tspan></text>
  <text x="84.0" y="178.0" text-anchor="start" fill="#5F6673" font-size="15" font-weight="500"><tspan x="84.0" dy="0">从付款人发起到受益人收款，消息流与资金流分别经过哪些节点</tspan></text>
  <text x="94" y="252" fill="#5F6673" font-size="12" font-weight="700">从输入到结果的最短学习路径</text>
  <line x1="94" y1="274" x2="1106" y2="274" stroke="#D9D6CC" stroke-width="1.4"/>
  <line x1="255.7" y1="408.0" x2="257.7" y2="408.0" stroke="#1B365D" stroke-width="3" stroke-linecap="round" marker-end="url(#arrow)"/>
  <rect x="94.0" y="334.0" width="153.7" height="148.0" rx="8" fill="#F0EDE4" stroke="#1B365D" stroke-width="1.4" filter="url(#soft-shadow)"/>
  <rect x="94.0" y="334.0" width="153.7" height="5" rx="2.5" fill="#1B365D"/>
  <circle cx="120.0" cy="362.0" r="15" fill="#1B365D"/>
  <text x="120.0" y="367.0" text-anchor="middle" fill="#ffffff" font-size="12" font-weight="800"><tspan x="120.0" dy="0">1</tspan></text>
  <text x="146.0" y="367.0" text-anchor="start" fill="#111827" font-size="17" font-weight="760"><tspan x="146.0" dy="0">1. 付款人发起</tspan></text>
  <text x="116.0" y="454.0" text-anchor="start" fill="#5F6673" font-size="12" font-weight="560"><tspan x="116.0" dy="0">东京买家填写汇款信息</tspan></text>
  <line x1="427.3" y1="408.0" x2="429.3" y2="408.0" stroke="#1B365D" stroke-width="3" stroke-linecap="round" marker-end="url(#arrow)"/>
  <rect x="265.7" y="334.0" width="153.7" height="148.0" rx="8" fill="#FAF9F5" stroke="#D9D6CC" stroke-width="1.4" filter="url(#soft-shadow)"/>
  <circle cx="291.7" cy="362.0" r="15" fill="#1B365D"/>
  <text x="291.7" y="367.0" text-anchor="middle" fill="#ffffff" font-size="12" font-weight="800"><tspan x="291.7" dy="0">2</tspan></text>
  <text x="317.7" y="367.0" text-anchor="start" fill="#111827" font-size="17" font-weight="760"><tspan x="317.7" dy="0">2. 发送行建报文</tspan></text>
  <text x="287.7" y="454.0" text-anchor="start" fill="#5F6673" font-size="12" font-weight="560"><tspan x="287.7" dy="0">MUFG 创建 MT103</tspan></text>
  <line x1="599.0" y1="408.0" x2="601.0" y2="408.0" stroke="#1B365D" stroke-width="3" stroke-linecap="round" marker-end="url(#arrow)"/>
  <rect x="437.3" y="334.0" width="153.7" height="148.0" rx="8" fill="#FAF9F5" stroke="#D9D6CC" stroke-width="1.4" filter="url(#soft-shadow)"/>
  <circle cx="463.3" cy="362.0" r="15" fill="#1B365D"/>
  <text x="463.3" y="367.0" text-anchor="middle" fill="#ffffff" font-size="12" font-weight="800"><tspan x="463.3" dy="0">3</tspan></text>
  <text x="489.3" y="367.0" text-anchor="start" fill="#111827" font-size="17" font-weight="760"><tspan x="489.3" dy="0">3. SWIFT 路由</tspan></text>
  <text x="459.3" y="454.0" text-anchor="start" fill="#5F6673" font-size="12" font-weight="560"><tspan x="459.3" dy="0">验证→加密→送达</tspan></text>
  <line x1="770.7" y1="408.0" x2="772.7" y2="408.0" stroke="#1B365D" stroke-width="3" stroke-linecap="round" marker-end="url(#arrow)"/>
  <rect x="609.0" y="334.0" width="153.7" height="148.0" rx="8" fill="#FAF9F5" stroke="#D9D6CC" stroke-width="1.4" filter="url(#soft-shadow)"/>
  <circle cx="635.0" cy="362.0" r="15" fill="#1B365D"/>
  <text x="635.0" y="367.0" text-anchor="middle" fill="#ffffff" font-size="12" font-weight="800"><tspan x="635.0" dy="0">4</tspan></text>
  <text x="661.0" y="367.0" text-anchor="start" fill="#111827" font-size="17" font-weight="760"><tspan x="661.0" dy="0">4. 代理行链路</tspan></text>
  <text x="631.0" y="454.0" text-anchor="start" fill="#5F6673" font-size="12" font-weight="560"><tspan x="631.0" dy="0">直连或经过 Citibank 中转</tspan></text>
  <line x1="942.3" y1="408.0" x2="944.3" y2="408.0" stroke="#1B365D" stroke-width="3" stroke-linecap="round" marker-end="url(#arrow)"/>
  <rect x="780.7" y="334.0" width="153.7" height="148.0" rx="8" fill="#FAF9F5" stroke="#D9D6CC" stroke-width="1.4" filter="url(#soft-shadow)"/>
  <circle cx="806.7" cy="362.0" r="15" fill="#1B365D"/>
  <text x="806.7" y="367.0" text-anchor="middle" fill="#ffffff" font-size="12" font-weight="800"><tspan x="806.7" dy="0">5</tspan></text>
  <text x="832.7" y="367.0" text-anchor="start" fill="#111827" font-size="17" font-weight="760"><tspan x="832.7" dy="0">5. 资金结算</tspan></text>
  <text x="802.7" y="454.0" text-anchor="start" fill="#5F6673" font-size="12" font-weight="560"><tspan x="802.7" dy="0">Nostro/Vostro 内部记账</tspan></text>
  <rect x="952.3" y="334.0" width="153.7" height="148.0" rx="8" fill="#F0EDE4" stroke="#1B365D" stroke-width="1.4" filter="url(#soft-shadow)"/>
  <rect x="952.3" y="334.0" width="153.7" height="5" rx="2.5" fill="#1B365D"/>
  <circle cx="978.3" cy="362.0" r="15" fill="#1B365D"/>
  <text x="978.3" y="367.0" text-anchor="middle" fill="#ffffff" font-size="12" font-weight="800"><tspan x="978.3" dy="0">6</tspan></text>
  <text x="1004.3" y="367.0" text-anchor="start" fill="#111827" font-size="17" font-weight="760"><tspan x="1004.3" dy="0">6. 受益人收款</tspan></text>
  <text x="974.3" y="454.0" text-anchor="start" fill="#5F6673" font-size="12" font-weight="560"><tspan x="974.3" dy="0">Barclays 贷记供应商账户</tspan></text>
</svg>
