<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="675" viewBox="0 0 1200 675" role="img" aria-label="代理行与结算——消息与资金两条线" font-family="Noto Sans SC, Source Han Sans SC, PingFang SC, system-ui, sans-serif">
  <defs>
    <filter id="soft-shadow" x="-8%" y="-12%" width="116%" height="128%">
      <feDropShadow dx="0" dy="5" stdDeviation="7" flood-color="#111827" flood-opacity="0.08"/>
    </filter>
    <pattern id="dot-grid" width="28" height="28" patternUnits="userSpaceOnUse">
      <circle cx="1.5" cy="1.5" r="1.2" fill="#E8E4DA" opacity="0.85"/>
    </pattern>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth">
      <path d="M2,2 L10,6 L2,10" fill="none" stroke="#1B365D" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" />
    </marker>
  </defs>
  <rect width="1200" height="675" fill="#F5F4ED"/>
  <rect x="1" y="1" width="1198" height="673" rx="18" fill="#FAF9F5" stroke="#D9D6CC" stroke-width="1.6"/>
  <rect x="1" y="1" width="1198" height="673" rx="18" fill="url(#dot-grid)" opacity="0.34"/>
  <rect x="72" y="206" width="1056" height="390" rx="16" fill="#F5F4ED" stroke="#D9D6CC" stroke-width="1.1" opacity="0.82"/>
  <text x="84" y="82" fill="#1B365D" font-size="12" font-weight="800" letter-spacing="1.2">第5章</text>
  <text x="1116" y="82" text-anchor="end" fill="#5F6673" font-size="11" font-weight="700" letter-spacing="1">教学图示</text>
  <rect x="84" y="100" width="54" height="4" rx="2" fill="#1B365D"/>
  <text x="84.0" y="136.0" text-anchor="start" fill="#111827" font-size="31" font-weight="800"><tspan x="84.0" dy="0">代理行与结算——消息与资金两条线</tspan></text>
  <text x="84.0" y="178.0" text-anchor="start" fill="#5F6673" font-size="15" font-weight="500"><tspan x="84.0" dy="0">消息流经过 SWIFT 高速送达，资金流通过代理行 Nostro/Vostro 账户完成结算</tspan></text>
  <line x1="286.0" y1="303.0" x2="588.0" y2="275.0" stroke="#4A7DB4" stroke-width="2" stroke-linecap="round" marker-end="url(#arrow)"/>
  <line x1="588.0" y1="275.0" x2="1032.0" y2="513.0" stroke="#4A7DB4" stroke-width="2" stroke-linecap="round" marker-end="url(#arrow)"/>
  <line x1="286.0" y1="303.0" x2="914.0" y2="303.0" stroke="#4A7DB4" stroke-width="2" stroke-linecap="round" marker-end="url(#arrow)"/>
  <line x1="914.0" y1="303.0" x2="1032.0" y2="513.0" stroke="#4A7DB4" stroke-width="2" stroke-linecap="round" marker-end="url(#arrow)"/>
  <rect x="184.0" y="260.0" width="204.0" height="86.0" rx="8" fill="#F0EDE4" stroke="#1B365D" stroke-width="1.4" filter="url(#soft-shadow)"/>
  <rect x="184.0" y="260.0" width="204.0" height="5" rx="2.5" fill="#1B365D"/>
  <circle cx="210.0" cy="288.0" r="15" fill="#1B365D"/>
  <text x="210.0" y="293.0" text-anchor="middle" fill="#ffffff" font-size="12" font-weight="800"><tspan x="210.0" dy="0">1</tspan></text>
  <text x="236.0" y="293.0" text-anchor="start" fill="#111827" font-size="17" font-weight="760"><tspan x="236.0" dy="0">付款银行 (MUFG)</tspan></text>
  <text x="206.0" y="318.0" text-anchor="start" fill="#5F6673" font-size="12" font-weight="560"><tspan x="206.0" dy="0">发送 MT103 → 通知 Citibank</tspan><tspan x="206.0" dy="16">扣款</tspan></text>
  <rect x="486.0" y="232.0" width="204.0" height="86.0" rx="8" fill="#FAF9F5" stroke="#D9D6CC" stroke-width="1.4" filter="url(#soft-shadow)"/>
  <circle cx="512.0" cy="260.0" r="15" fill="#1B365D"/>
  <text x="512.0" y="265.0" text-anchor="middle" fill="#ffffff" font-size="12" font-weight="800"><tspan x="512.0" dy="0">2</tspan></text>
  <text x="538.0" y="265.0" text-anchor="start" fill="#111827" font-size="17" font-weight="760"><tspan x="538.0" dy="0">SWIFT 网络</tspan></text>
  <text x="508.0" y="290.0" text-anchor="start" fill="#5F6673" font-size="12" font-weight="560"><tspan x="508.0" dy="0">传递消息（不参与结算）</tspan></text>
  <rect x="812.0" y="260.0" width="204.0" height="86.0" rx="8" fill="#FAF9F5" stroke="#D9D6CC" stroke-width="1.4" filter="url(#soft-shadow)"/>
  <circle cx="838.0" cy="288.0" r="15" fill="#1B365D"/>
  <text x="838.0" y="293.0" text-anchor="middle" fill="#ffffff" font-size="12" font-weight="800"><tspan x="838.0" dy="0">3</tspan></text>
  <text x="864.0" y="293.0" text-anchor="start" fill="#111827" font-size="17" font-weight="760"><tspan x="864.0" dy="0">代理行 (Citibank</tspan><tspan x="864.0" dy="21">NY)</tspan></text>
  <text x="834.0" y="318.0" text-anchor="start" fill="#5F6673" font-size="12" font-weight="560"><tspan x="834.0" dy="0">借记 MUFG Nostro → 贷记</tspan><tspan x="834.0" dy="16">Barclays Vostro</tspan></text>
  <rect x="930.0" y="470.0" width="204.0" height="86.0" rx="8" fill="#FAF9F5" stroke="#D9D6CC" stroke-width="1.4" filter="url(#soft-shadow)"/>
  <circle cx="956.0" cy="498.0" r="15" fill="#1B365D"/>
  <text x="956.0" y="503.0" text-anchor="middle" fill="#ffffff" font-size="12" font-weight="800"><tspan x="956.0" dy="0">4</tspan></text>
  <text x="982.0" y="503.0" text-anchor="start" fill="#111827" font-size="17" font-weight="760"><tspan x="982.0" dy="0">收款银行 (Barclays)</tspan></text>
  <text x="952.0" y="528.0" text-anchor="start" fill="#5F6673" font-size="12" font-weight="560"><tspan x="952.0" dy="0">收到消息 + 结算确认 → 入账受益人</tspan></text>
</svg>
