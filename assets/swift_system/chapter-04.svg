<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="675" viewBox="0 0 1200 675" role="img" aria-label="MT 报文格式 vs ISO 20022" font-family="Noto Sans SC, Source Han Sans SC, PingFang SC, system-ui, sans-serif">
  <defs>
    <filter id="soft-shadow" x="-8%" y="-12%" width="116%" height="128%">
      <feDropShadow dx="0" dy="5" stdDeviation="7" flood-color="#111827" flood-opacity="0.08"/>
    </filter>
    <pattern id="dot-grid" width="28" height="28" patternUnits="userSpaceOnUse">
      <circle cx="1.5" cy="1.5" r="1.2" fill="#E8E4DA" opacity="0.85"/>
    </pattern>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth">
      <path d="M2,2 L10,6 L2,10" fill="none" stroke="#1B365D" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" />
    </marker>
  </defs>
  <rect width="1200" height="675" fill="#F5F4ED"/>
  <rect x="1" y="1" width="1198" height="673" rx="18" fill="#FAF9F5" stroke="#D9D6CC" stroke-width="1.6"/>
  <rect x="1" y="1" width="1198" height="673" rx="18" fill="url(#dot-grid)" opacity="0.34"/>
  <rect x="72" y="206" width="1056" height="390" rx="16" fill="#F5F4ED" stroke="#D9D6CC" stroke-width="1.1" opacity="0.82"/>
  <text x="84" y="82" fill="#1B365D" font-size="12" font-weight="800" letter-spacing="1.2">第4章</text>
  <text x="1116" y="82" text-anchor="end" fill="#5F6673" font-size="11" font-weight="700" letter-spacing="1">教学图示</text>
  <rect x="84" y="100" width="54" height="4" rx="2" fill="#1B365D"/>
  <text x="84.0" y="136.0" text-anchor="start" fill="#111827" font-size="31" font-weight="800"><tspan x="84.0" dy="0">MT 报文格式 vs ISO 20022</tspan></text>
  <text x="84.0" y="178.0" text-anchor="start" fill="#5F6673" font-size="15" font-weight="500"><tspan x="84.0" dy="0">传统 MT 报文与新一代 ISO 20022 报文的结构差异</tspan></text>
  <rect x="94" y="222" width="492" height="344" rx="12" fill="#FAF9F5" stroke="#D9D6CC" stroke-width="1.6"/>
  <rect x="94" y="222" width="492" height="58" rx="12" fill="#1B365D" opacity="0.96"/>
  <rect x="94" y="262" width="492" height="18" fill="#1B365D" opacity="0.96"/>
  <text x="122.0" y="258.0" text-anchor="start" fill="#ffffff" font-size="21" font-weight="800"><tspan x="122.0" dy="0">MT (传统)</tspan></text>
  <circle cx="130" cy="318" r="6" fill="#1B365D"/>
  <text x="150.0" y="324.0" text-anchor="start" fill="#111827" font-size="17" font-weight="600"><tspan x="150.0" dy="0">固定宽度、定长字段</tspan></text>
  <circle cx="130" cy="364" r="6" fill="#1B365D"/>
  <text x="150.0" y="370.0" text-anchor="start" fill="#111827" font-size="17" font-weight="600"><tspan x="150.0" dy="0">字段 35-50 字符限制</tspan></text>
  <circle cx="130" cy="410" r="6" fill="#1B365D"/>
  <text x="150.0" y="416.0" text-anchor="start" fill="#111827" font-size="17" font-weight="600"><tspan x="150.0" dy="0">地址、名称混在一个字段</tspan></text>
  <circle cx="130" cy="456" r="6" fill="#1B365D"/>
  <text x="150.0" y="462.0" text-anchor="start" fill="#111827" font-size="17" font-weight="600"><tspan x="150.0" dy="0">需查表解读</tspan></text>
  <circle cx="130" cy="502" r="6" fill="#1B365D"/>
  <text x="150.0" y="508.0" text-anchor="start" fill="#111827" font-size="17" font-weight="600"><tspan x="150.0" dy="0">已使用 40+ 年</tspan></text>
  <rect x="614" y="222" width="492" height="344" rx="12" fill="#FAF9F5" stroke="#D9D6CC" stroke-width="1.6"/>
  <rect x="614" y="222" width="492" height="58" rx="12" fill="#4A7DB4" opacity="0.96"/>
  <rect x="614" y="262" width="492" height="18" fill="#4A7DB4" opacity="0.96"/>
  <text x="642.0" y="258.0" text-anchor="start" fill="#ffffff" font-size="21" font-weight="800"><tspan x="642.0" dy="0">ISO 20022 (MX)</tspan></text>
  <circle cx="650" cy="318" r="6" fill="#4A7DB4"/>
  <text x="670.0" y="324.0" text-anchor="start" fill="#111827" font-size="17" font-weight="600"><tspan x="670.0" dy="0">XML 格式、可扩展</tspan></text>
  <circle cx="650" cy="364" r="6" fill="#4A7DB4"/>
  <text x="670.0" y="370.0" text-anchor="start" fill="#111827" font-size="17" font-weight="600"><tspan x="670.0" dy="0">几乎没有字段长度限制</tspan></text>
  <circle cx="650" cy="410" r="6" fill="#4A7DB4"/>
  <text x="670.0" y="416.0" text-anchor="start" fill="#111827" font-size="17" font-weight="600"><tspan x="670.0" dy="0">地址按街道/城市/邮编结构化</tspan></text>
  <circle cx="650" cy="456" r="6" fill="#4A7DB4"/>
  <text x="670.0" y="462.0" text-anchor="start" fill="#111827" font-size="17" font-weight="600"><tspan x="670.0" dy="0">标签自说明、机器可读</tspan></text>
  <circle cx="650" cy="502" r="6" fill="#4A7DB4"/>
  <text x="670.0" y="508.0" text-anchor="start" fill="#111827" font-size="17" font-weight="600"><tspan x="670.0" dy="0">2025年11月后强制执行</tspan></text>
</svg>
