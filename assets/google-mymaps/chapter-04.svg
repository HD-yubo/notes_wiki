<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="675" viewBox="0 0 1200 675" role="img" aria-label="标记、线条和形状" font-family="Noto Sans SC, Source Han Sans SC, PingFang SC, system-ui, sans-serif">
  <defs>
    <filter id="soft-shadow" x="-8%" y="-12%" width="116%" height="128%">
      <feDropShadow dx="0" dy="5" stdDeviation="7" flood-color="#111827" flood-opacity="0.08"/>
    </filter>
    <pattern id="dot-grid" width="28" height="28" patternUnits="userSpaceOnUse">
      <circle cx="1.5" cy="1.5" r="1.2" fill="#e8e4da" opacity="0.85"/>
    </pattern>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth">
      <path d="M2,2 L10,6 L2,10" fill="none" stroke="#1b365d" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" />
    </marker>
  </defs>
  <rect width="1200" height="675" fill="#f5f4ed"/>
  <rect x="1" y="1" width="1198" height="673" rx="18" fill="#faf9f5" stroke="#d9d6cc" stroke-width="1.6"/>
  <rect x="1" y="1" width="1198" height="673" rx="18" fill="url(#dot-grid)" opacity="0.34"/>
  <rect x="72" y="206" width="1056" height="390" rx="16" fill="#f5f4ed" stroke="#d9d6cc" stroke-width="1.1" opacity="0.82"/>
  <text x="84" y="82" fill="#1b365d" font-size="12" font-weight="800" letter-spacing="1.2">第4章</text>
  <text x="1116" y="82" text-anchor="end" fill="#5f6673" font-size="11" font-weight="700" letter-spacing="1">教学图示</text>
  <rect x="84" y="100" width="54" height="4" rx="2" fill="#1b365d"/>
  <text x="84.0" y="136.0" text-anchor="start" fill="#111827" font-size="31" font-weight="800"><tspan x="84.0" dy="0">标记、线条和形状</tspan></text>
  <text x="84.0" y="178.0" text-anchor="start" fill="#5f6673" font-size="15" font-weight="500"><tspan x="84.0" dy="0">三种地图元素的适用场景：标记点、绘制线条、绘制形状。</tspan></text>
  <line x1="600.0" y1="408.0" x2="414.0" y2="289.0" stroke="#d9d6cc" stroke-width="2" stroke-linecap="round"/>
  <line x1="600.0" y1="408.0" x2="802.0" y2="289.0" stroke="#d9d6cc" stroke-width="2" stroke-linecap="round"/>
  <line x1="600.0" y1="408.0" x2="368.0" y2="415.0" stroke="#d9d6cc" stroke-width="2" stroke-linecap="round"/>
  <rect x="452" y="350" width="296" height="116" rx="14" fill="#1b365d"/>
  <text x="600.0" y="404.0" text-anchor="middle" fill="#ffffff" font-size="21" font-weight="800"><tspan x="600.0" dy="0">地图元素</tspan></text>
  <rect x="210.0" y="246.0" width="204.0" height="86.0" rx="8" fill="#f7f5ee" stroke="#1b365d" stroke-width="1.4" filter="url(#soft-shadow)"/>
  <rect x="210.0" y="246.0" width="204.0" height="5" rx="2.5" fill="#1b365d"/>
  <text x="232.0" y="279.0" text-anchor="start" fill="#111827" font-size="17" font-weight="760"><tspan x="232.0" dy="0">标记点</tspan></text>
  <text x="232.0" y="304.0" text-anchor="start" fill="#5f6673" font-size="12" font-weight="560"><tspan x="232.0" dy="0">地标、商店、位置</tspan></text>
  <rect x="802.0" y="246.0" width="204.0" height="86.0" rx="8" fill="#faf9f5" stroke="#d9d6cc" stroke-width="1.4" filter="url(#soft-shadow)"/>
  <text x="824.0" y="279.0" text-anchor="start" fill="#111827" font-size="17" font-weight="760"><tspan x="824.0" dy="0">线条</tspan></text>
  <text x="824.0" y="304.0" text-anchor="start" fill="#5f6673" font-size="12" font-weight="560"><tspan x="824.0" dy="0">路线、路径、边界</tspan></text>
  <rect x="164.0" y="372.0" width="204.0" height="86.0" rx="8" fill="#faf9f5" stroke="#d9d6cc" stroke-width="1.4" filter="url(#soft-shadow)"/>
  <text x="186.0" y="405.0" text-anchor="start" fill="#111827" font-size="17" font-weight="760"><tspan x="186.0" dy="0">形状</tspan></text>
  <text x="186.0" y="430.0" text-anchor="start" fill="#5f6673" font-size="12" font-weight="560"><tspan x="186.0" dy="0">区域、热区、范围</tspan></text>
</svg>
